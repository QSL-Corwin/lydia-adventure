<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydia Scout Corwin</title>
    <!-- Importing a fun, playful font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* This sets up the pink background and the overall layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffc0cb; /* Classic pink background */
            /* Adding a subtle, darker pink polka dot pattern */
            background-image: radial-gradient(#ff8da1 15%, transparent 16%), radial-gradient(#ff8da1 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column; /* NEW: Stacks multiple cards vertically */
            align-items: center; /* NEW: Centers the cards */
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden; /* Hide sideways scrolling, but allow scrolling down! */
        }

        /* The white box that holds the text and picture */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 85%;
            z-index: 10; /* Keeps the card above the flowers */
            position: relative;
            margin: 40px auto; /* Centers the card and gives it space on top and bottom */
        }

        /* Styling for Lydia's name */
        h1 {
            color: #d81b60; /* Dark pink/magenta */
            font-size: 2.8em;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #ffd1dc;
        }

        /* Styling for the picture */
        img {
            max-width: 100%;
            height: auto;
            min-width: 0; /* Ensures the picture shrinks safely on small phone screens */
            border-radius: 15px;
            border: 8px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            /* This rotates the picture slightly for a fun, scrapbook feel */
            transform: rotate(-2deg); 
            transition: transform 0.3s ease;
        }

        /* Makes the picture interactive - it straightens when hovered over! */
        img:hover {
            transform: rotate(0deg) scale(1.02);
        }

        /* --- NEW: Styling for the artwork rotation fade effect --- */
        #myArt {
            transition: opacity 0.5s ease-in-out, transform 0.3s ease;
        }

        /* --- NEW: Styling for the photo swiper container and buttons --- */
        .photo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        
        .nav-btn {
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.2s;
            /* This keeps the buttons from shrinking */
            flex-shrink: 0; 
        }
        
        .nav-btn:hover {
            background-color: #d81b60;
            transform: scale(1.1);
        }

        /* Styling for the phrase below the picture */
        h2 {
            color: #ff4081; /* Bright pink */
            font-size: 2em;
            margin-top: 25px;
            margin-bottom: 0;
            letter-spacing: 1px;
        }

        /* --- NEW: Making it look great on phones and tablets --- */
        @media (max-width: 600px) {
            .card {
                padding: 25px 15px; /* Use less white space on small screens */
                width: 90%;
                margin: 20px auto; /* Slightly smaller top/bottom margins on phones */
            }
            h1 {
                font-size: 2.2em; /* Slightly smaller name */
            }
            h2 {
                font-size: 1.5em; /* Slightly smaller phrase */
            }
            .photo-container {
                gap: 8px; /* Bring the buttons closer so the picture can be bigger */
            }
            /* Make the flowers smaller so they don't crowd the screen on phones */
            .f1 { font-size: 30px; }
            .f2 { font-size: 35px; }
            .f3 { font-size: 25px; }
            .f4 { font-size: 30px; }
            .f5 { font-size: 20px; }
            .f6 { font-size: 25px; }
            .f7 { font-size: 20px; }
            .f8 { font-size: 20px; }
        }

        /* --- Animations for the background flowers --- */
        .flower {
            position: absolute;
            font-size: 40px;
            user-select: none; /* Prevents text highlighting */
            z-index: 1;
            /* This makes them float up and down endlessly */
            animation: float 6s ease-in-out infinite; 
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(20deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Placing the individual flowers around the screen */
        .f1 { top: 10%; left: 8%; font-size: 50px; animation-delay: 0s; }
        .f2 { top: 15%; right: 12%; font-size: 60px; animation-delay: 1s; }
        .f3 { bottom: 10%; left: 15%; font-size: 45px; animation-delay: 2s; }
        .f4 { bottom: 15%; right: 10%; font-size: 55px; animation-delay: 0.5s; }
        .f5 { top: 45%; left: 3%; font-size: 35px; animation-delay: 1.5s; }
        .f6 { top: 50%; right: 4%; font-size: 40px; animation-delay: 2.5s; }
        .f7 { top: 5%; left: 50%; font-size: 30px; animation-delay: 0.8s; }
        .f8 { bottom: 5%; right: 50%; font-size: 30px; animation-delay: 1.8s; }

        /* --- NEW: Styling for the tabs --- */
        .tab-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            z-index: 10;
        }
        
        .tab-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #ff4081;
            border: 3px solid #ff4081;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.2em;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .tab-btn.active {
            background-color: #ff4081;
            color: white;
        }
        
        /* This class hides the card that isn't selected */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Background Flowers -->
    <div class="flower f1">🌸</div>
    <div class="flower f2">🌺</div>
    <div class="flower f3">🌼</div>
    <div class="flower f4">🌸</div>
    <div class="flower f5">🌻</div>
    <div class="flower f6">🌷</div>
    <div class="flower f7">🌺</div>
    <div class="flower f8">🌼</div>

    <!-- NEW: The Tab Buttons -->
    <div class="tab-container">
        <button id="btnAdventure" class="tab-btn active" onclick="showTab('adventure')">📸 My Adventures</button>
        <button id="btnArt" class="tab-btn" onclick="showTab('art')">🎨 My Artwork</button>
    </div>

    <!-- The Main Content Card -->
    <div id="cardAdventure" class="card">
        <h1>Lydia Scout Corwin</h1>
        
        <!-- NEW: The photo container with buttons! -->
        <div class="photo-container">
            <button class="nav-btn" onclick="prevPhoto()">&#10094;</button>
            <img id="myPhoto" src="IMG_9529.jpg" alt="Lydia Scout Corwin ready for adventure!">
            <button class="nav-btn" onclick="nextPhoto()">&#10095;</button>
        </div>
        
        <h2>Full of Adventure!</h2>
    </div>

    <!-- NEW: The Artwork Card -->
    <div id="cardArt" class="card hidden">
        <h1>My Artwork 🎨</h1>
        
        <!-- We use the same photo-container to keep the spacing neat -->
        <div class="photo-container">
            <img id="myArt" src="IMG_0378.jpg" alt="Lydia's beautiful artwork">
        </div>
        
        <h2>A Rotating Gallery!</h2>
    </div>

    <!-- NEW: JavaScript to make the buttons work! -->
    <script>
        // --- NEW: Tab Switching Logic ---
        function showTab(tabName) {
            const advCard = document.getElementById('cardAdventure');
            const artCard = document.getElementById('cardArt');
            const btnAdv = document.getElementById('btnAdventure');
            const btnArt = document.getElementById('btnArt');

            if (tabName === 'adventure') {
                advCard.classList.remove('hidden');
                artCard.classList.add('hidden');
                btnAdv.classList.add('active');
                btnArt.classList.remove('active');
            } else if (tabName === 'art') {
                artCard.classList.remove('hidden');
                advCard.classList.add('hidden');
                btnArt.classList.add('active');
                btnAdv.classList.remove('active');
            }
        }

        // This is a "List" (an Array) of your pictures.
        // Right now, it has your first picture and two placeholders I made.
        // You can replace the placeholder text with your real picture names!
        const myPhotos = [
            "IMG_9529.jpg",
            "IMG_9530.jpg",
            "IMG_9531.jpg",
            "IMG_9532.jpg"
        ];
        
        let photoIndex = 0; // Computers start counting at 0!
        const photoElement = document.getElementById("myPhoto");

        function nextPhoto() {
            photoIndex = photoIndex + 1;
            // If we click past the last photo, loop back to the start
            if (photoIndex >= myPhotos.length) {
                photoIndex = 0; 
            }
            photoElement.src = myPhotos[photoIndex];
        }

        function prevPhoto() {
            photoIndex = photoIndex - 1;
            // If we go backwards past the first photo, go to the very last one
            if (photoIndex < 0) {
                photoIndex = myPhotos.length - 1; 
            }
            photoElement.src = myPhotos[photoIndex];
        }

        // --- NEW: Artwork Rotating Logic ---
        const artPhotos = [
            "IMG_0378.jpg",
            "IMG_0129.jpg",
            "IMG_0070.jpg",
            "IMG_0379.jpg",
            "IMG_0383.jpg",
            "IMG_0384.jpg"
        ];
        
        let artIndex = 0;
        const artElement = document.getElementById("myArt");

        // This timer makes the artwork change all by itself every 3.5 seconds!
        setInterval(() => {
            // First, smoothly fade the picture out until it's invisible (opacity: 0)
            artElement.style.opacity = 0;
            
            // Wait just a tiny bit for the fade out, then swap the picture
            setTimeout(() => {
                artIndex = artIndex + 1;
                // Loop back to the very first drawing if we run out
                if (artIndex >= artPhotos.length) {
                    artIndex = 0;
                }
                artElement.src = artPhotos[artIndex];
                
                // Fade the new picture back in! (opacity: 1)
                artElement.style.opacity = 1;
            }, 500); 
            
        }, 3500); // 3500 means 3.5 seconds

    </script>
</body>
</html>
